<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/crud/style.css" />
    <title>crud system</title>
  </head>
  <body>
    <div class="crud">
      <div class="head">
        <h2>CRUD</h2>
        <p>product management system</p>
      </div>
      <div class="inputs">
        <input id="title" type="text" placeholder="title" />
        <div class="price">
          <input
            onkeyup="getTotal()"
            id="price"
            type="number"
            placeholder="price"
          />
          <input
            onkeyup="getTotal()"
            id="taxes"
            type="number"
            placeholder="taxes"
          />
          <input
            onkeyup="getTotal()"
            id="ads"
            type="number"
            placeholder="ads"
          />
          <input
            onkeyup="getTotal()"
            id="discount"
            type="number"
            placeholder="discount"
          />
          <small id="total"></small>
        </div>
        <input id="count" type="number" placeholder="count" />
        <input id="category" type="text" placeholder="category" />
        <button id="submit">Create</button>
      </div>
      <div class="outputs">
        <div class="searchBlock">
          <inputddd
            onkeyup="searchData(this.value)"
            type="text"
            id="search"
            placeholder="search"
          />

          <div class="btnSearch">
            <button onclick="getSearchMode(this.id)" id="searchBytitle">
              search By Title
            </button>
            <button onclick="getSearchMode(this.id)" id="searchByCategory">
              search By Category
            </button>
          </div>
        </div>
        <div id="deleteAll"></div>
        <table>
          <tr>
            <th>id</th>
            <th>title</th>
            <th>price</th>
            <th>taxes</th>
            <th>ads</th>
            <th>discount</th>
            <th>total</th>
            <th>category</th>
            <th>update</th>
            <th>delete</th>
          </tr>
          <tbody id="tbody">
            <tr>
              <td>1</td>
              <td>samsung</td>
              <td>2000</td>
              <td>100</td>
              <td>100</td>
              <td>100</td>
              <td>2100</td>
              <td>phone</td>
              <td><button id="update">update</button></td>
              <td><button id="delete">delete</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <script src="/crud/main.js"></script>
  </body>
</html>
